<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screeps Dojo Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a1a; color: #cccccc; font-family: monospace; font-size: 13px; }
#app { display: flex; flex-direction: column; height: 100vh; }
#tabs { display: flex; background: #111; border-bottom: 1px solid #333; }
.tab-btn {
	padding: 8px 18px; cursor: pointer; background: transparent;
	color: #888; border: none; font-family: monospace; font-size: 13px;
	border-bottom: 2px solid transparent;
}
.tab-btn.active { color: #ddd; border-bottom-color: #65fd62; }
.tab-btn:hover:not(.active) { color: #bbb; }
.tab-pane { display: none; flex: 1; overflow: hidden; }
.tab-pane.active { display: flex; }

/* ---- Map Editor ---- */
#editor-pane { flex-direction: row; }
#left-panel { width: 200px; min-width: 200px; background: #141414; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 0; overflow-y: auto; }
#right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#canvas-area { flex: 1; overflow: auto; background: #1a1a1a; display: flex; align-items: flex-start; justify-content: flex-start; padding: 10px; }
#bottom-panel { border-top: 1px solid #333; background: #141414; padding: 8px; display: flex; gap: 8px; flex-direction: column; max-height: 60vh; overflow: auto; }

.panel-section { border-bottom: 1px solid #2a2a2a; padding: 8px; }
.panel-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

#room-name-input {
	width: 100%; background: #1e1e1e; border: 1px solid #444; color: #ddd;
	font-family: monospace; font-size: 12px; padding: 4px 6px;
}
#room-name-input.invalid { border-color: #cc3333; }

.terrain-btn, .obj-btn, .eraser-btn, .tool-btn {
	display: inline-block; padding: 4px 8px; margin: 2px; cursor: pointer;
	background: #252525; border: 1px solid #444; color: #aaa;
	font-family: monospace; font-size: 12px; border-radius: 2px;
}
.tool-btn { width: calc(100% - 4px); text-align: left; }
.terrain-btn.active, .obj-btn.active, .eraser-btn.active, .tool-btn.active {
	background: #2a3a2a; border-color: #65fd62; color: #65fd62;
}
.terrain-btn:hover, .obj-btn:hover, .eraser-btn:hover, .tool-btn:hover { background: #333; }

#border-wall-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; margin-top: 4px; }
#border-wall-toggle input { cursor: pointer; }

#obj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
#obj-grid .obj-btn, #obj-grid .eraser-btn { margin: 0; white-space: normal; text-align: center; }

#props-panel { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 80px; }
#props-panel.hidden { display: none; }
.prop-row { display: flex; align-items: center; gap: 6px; }
.prop-row label { color: #777; font-size: 11px; width: 70px; flex-shrink: 0; }
.prop-row input, .prop-row select {
	flex: 1; background: #1e1e1e; border: 1px solid #444; color: #ddd;
	font-family: monospace; font-size: 12px; padding: 3px 5px;
}
.prop-row input.json-invalid { border-color: #cc3333; }
#delete-btn {
	background: #3a1a1a; border: 1px solid #cc3333; color: #cc3333;
	font-family: monospace; font-size: 12px; padding: 4px 10px; cursor: pointer;
	border-radius: 2px; margin-top: 4px; align-self: flex-start;
}
#delete-btn:hover { background: #4a2020; }

#bottom-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#json-textarea {
	flex: 1; background: #111; border: 1px solid #333; color: #aaa;
	font-family: monospace; font-size: 11px; resize: vertical; min-height: 120px; height: 240px; padding: 6px;
}
.import-btns, .export-btns { display: flex; flex-direction: column; gap: 4px; }
.action-btn {
	padding: 4px 12px; cursor: pointer; background: #252525; border: 1px solid #555;
	color: #bbb; font-family: monospace; font-size: 12px; border-radius: 2px;
}
.action-btn:hover { background: #333; }
#file-input { display: none; }
#file-label {
	padding: 4px 12px; cursor: pointer; background: #252525; border: 1px solid #555;
	color: #bbb; font-family: monospace; font-size: 12px; border-radius: 2px;
	display: inline-block;
}
#file-label:hover { background: #333; }
#load-error { color: #cc5555; font-size: 11px; margin-top: 2px; }

/* ---- SVG canvas ---- */
#editor-svg { cursor: crosshair; display: block; }
#editor-svg .dojo-grid { pointer-events: none; }
.tile-overlay { opacity: 0; }
.tile-overlay:hover { opacity: 1; fill: rgba(255,255,255,0.12); }

/* ---- Replay Viewer ---- */
#replay-pane { flex-direction: row; overflow: hidden; }
#replay-left { width: 220px; min-width: 220px; background: #141414; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 0; overflow-y: auto; }
#replay-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#replay-canvas-area { flex: 1; overflow: hidden; background: #0e0e0e; display: flex; min-width: 0; min-height: 0; }
#replay-controls { border-top: 1px solid #333; background: #141414; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
#replay-drop-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 14px; border: 2px dashed #333; margin: 20px; border-radius: 4px; padding: 30px; cursor: pointer; text-align: center; }
#replay-drop-zone.drag-over { border-color: #65fd62; color: #65fd62; }
#replay-drop-zone.hidden { display: none; }
#replay-svg-wrap { display: none; }
#replay-svg-wrap.visible { display: block; flex: 1; min-width: 0; min-height: 0; cursor: grab; }
#replay-svg-wrap.panning { cursor: grabbing; }
#replay-svg-wrap svg { display: block; width: 100%; height: 100%; }
#replay-svg { display: block; }
#replay-slider-row { display: flex; align-items: center; gap: 8px; }
#replay-slider { flex: 1; cursor: pointer; accent-color: #65fd62; }
#replay-tick-label { color: #65fd62; font-size: 13px; min-width: 80px; }
#replay-playback-row { display: flex; align-items: center; gap: 10px; }
#replay-play-btn {
	padding: 4px 14px; cursor: pointer; background: #252525; border: 1px solid #65fd62;
	color: #65fd62; font-family: monospace; font-size: 12px; border-radius: 2px;
}
#replay-play-btn:hover { background: #1e3a1e; }
#replay-reset-view-btn {
	padding: 4px 10px; cursor: pointer; background: #252525; border: 1px solid #444;
	color: #ddd; font-family: monospace; font-size: 12px; border-radius: 2px;
}
#replay-reset-view-btn:hover { background: #333; }
#replay-speed-select {
	background: #1e1e1e; border: 1px solid #444; color: #ddd;
	font-family: monospace; font-size: 12px; padding: 3px 5px;
}
#replay-end-reason { color: #888; font-size: 11px; }
#replay-info-panel { padding: 8px; }
#replay-meta { color: #666; font-size: 11px; line-height: 1.6; }
#replay-creep-hits { margin-top: 6px; }
.replay-creep-row { font-size: 11px; color: #aaa; margin: 2px 0; }
.replay-file-input-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 8px; border-bottom: 1px solid #2a2a2a; }
#replay-file-input { display: none; }
#replay-file-label {
	padding: 4px 12px; cursor: pointer; background: #252525; border: 1px solid #555;
	color: #bbb; font-family: monospace; font-size: 12px; border-radius: 2px;
	display: inline-block;
}
#replay-file-label:hover { background: #333; }
#replay-load-error { color: #cc5555; font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
	<div id="tabs">
		<button class="tab-btn active" data-tab="editor">Map Editor</button>
		<button class="tab-btn" data-tab="replay">Replay Viewer</button>
	</div>

	<div id="editor-pane" class="tab-pane active">
		<div id="left-panel">
			<!-- Room name -->
			<div class="panel-section">
				<div class="panel-label">Room</div>
				<input id="room-name-input" type="text" value="W0N0" spellcheck="false">
			</div>

			<!-- Tool -->
			<div class="panel-section">
				<div class="panel-label">Tool</div>
				<button class="tool-btn active" data-tool="select">▣ select / edit</button>
				<div style="color:#666;font-size:10px;margin-top:4px;">click a placed object to select &amp; edit it</div>
			</div>

			<!-- Terrain palette -->
			<div class="panel-section">
				<div class="panel-label">Terrain</div>
				<button class="terrain-btn" data-terrain=".">plain .</button>
				<button class="terrain-btn" data-terrain="~">swamp ~</button>
				<button class="terrain-btn" data-terrain="#">wall #</button>
				<div id="border-wall-toggle">
					<input type="checkbox" id="border-wall-cb" checked>
					<label for="border-wall-cb">auto-wall border</label>
				</div>
			</div>

			<!-- Object palette -->
			<div class="panel-section">
				<div class="panel-label">Objects</div>
				<div id="obj-grid">
					<button class="obj-btn" data-obj="spawn">spawn</button>
					<button class="obj-btn" data-obj="extension">extension</button>
					<button class="obj-btn" data-obj="tower">tower</button>
					<button class="obj-btn" data-obj="storage">storage</button>
					<button class="obj-btn" data-obj="terminal">terminal</button>
					<button class="obj-btn" data-obj="link">link</button>
					<button class="obj-btn" data-obj="lab">lab</button>
					<button class="obj-btn" data-obj="factory">factory</button>
					<button class="obj-btn" data-obj="container">container</button>
					<button class="obj-btn" data-obj="road">road</button>
					<button class="obj-btn" data-obj="rampart">rampart</button>
					<button class="obj-btn" data-obj="constructedWall">constructed wall</button>
					<button class="obj-btn" data-obj="source">source</button>
					<button class="obj-btn" data-obj="controller">controller</button>
					<button class="obj-btn" data-obj="mineral">mineral</button>
					<button class="obj-btn" data-obj="flag">flag</button>
					<button class="eraser-btn" data-obj="eraser">eraser</button>
				</div>
			</div>

			<!-- Properties panel for selected object -->
			<div class="panel-section">
				<div class="panel-label">Properties</div>
				<div id="props-panel" class="hidden">
					<div class="prop-row" id="prop-owner-row">
						<label>owner</label>
						<select id="prop-owner">
							<option value="me">me</option>
							<option value="invader">invader</option>
							<option value="unclaimed">unclaimed / neutral</option>
						</select>
					</div>
					<div class="prop-row" id="prop-store-row">
						<label>store</label>
						<input id="prop-store" type="text" value="{}" spellcheck="false">
					</div>
					<div class="prop-row" id="prop-capacity-row">
						<label>capacity</label>
						<span id="prop-capacity" style="color:#888;font-size:11px;"></span>
					</div>
					<div class="prop-row" id="prop-flagname-row">
						<label>flag name</label>
						<input id="prop-flagname" type="text" value="" spellcheck="false">
					</div>
					<div class="prop-row" id="prop-level-row">
						<label>level</label>
						<input id="prop-level" type="number" value="0" min="0" max="8">
					</div>
					<div class="prop-row" id="prop-mineral-row">
						<label>mineral</label>
						<select id="prop-mineral">
							<option value="H">H</option>
							<option value="O">O</option>
							<option value="U">U</option>
							<option value="L">L</option>
							<option value="K">K</option>
							<option value="Z">Z</option>
							<option value="X">X</option>
						</select>
					</div>
					<div class="prop-row" id="prop-density-row">
						<label>density</label>
						<select id="prop-density">
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
						</select>
					</div>
					<button id="delete-btn">Delete</button>
				</div>
				<div id="no-sel-msg" style="color:#555;font-size:11px;padding:4px 0;">Click a placed object to edit</div>
			</div>
		</div>

		<div id="right-panel">
			<div id="canvas-area">
				<svg id="editor-svg" width="700" height="700" viewBox="0 0 50 50"
					xmlns="http://www.w3.org/2000/svg"></svg>
			</div>
			<div id="bottom-panel">
				<div id="bottom-row">
					<div class="import-btns">
						<div class="panel-label">Import</div>
						<label id="file-label">Load File
							<input type="file" id="file-input" accept=".json">
						</label>
						<button class="action-btn" id="load-btn">Load JSON</button>
					</div>
					<textarea id="json-textarea" placeholder="Paste map JSON here or view export..."></textarea>
					<div class="export-btns">
						<div class="panel-label">Export</div>
						<button class="action-btn" id="download-btn">Download map.json</button>
					</div>
				</div>
				<div id="load-error"></div>
			</div>
		</div>
	</div>

	<div id="replay-pane" class="tab-pane">
		<div id="replay-left">
			<div class="replay-file-input-wrap">
				<div class="panel-label">Recording</div>
				<label id="replay-file-label">Load File
					<input type="file" id="replay-file-input" accept=".json">
				</label>
				<div id="replay-load-error"></div>
			</div>
			<div id="replay-info-panel">
				<div id="replay-meta"></div>
				<div id="replay-creep-hits"></div>
			</div>
		</div>
		<div id="replay-main">
			<div id="replay-canvas-area">
				<div id="replay-drop-zone">
					<div>Drop recording.json here</div>
					<div style="font-size:11px;color:#333;margin-top:8px;">or use Load File</div>
				</div>
				<div id="replay-svg-wrap"></div>
			</div>
			<div id="replay-controls">
				<div id="replay-slider-row">
					<span style="color:#666;font-size:11px;">Tick</span>
					<input type="range" id="replay-slider" min="0" max="0" value="0">
					<span id="replay-tick-label">—</span>
				</div>
				<div id="replay-playback-row">
					<button id="replay-play-btn">&#9654; Play</button>
					<select id="replay-speed-select">
						<option value="0.5">0.5×</option>
						<option value="1" selected>1×</option>
						<option value="2">2×</option>
						<option value="4">4×</option>
					</select>
					<button id="replay-reset-view-btn" title="Reset zoom/pan (or double-click the map)">Reset view</button>
					<span id="replay-end-reason"></span>
				</div>
			</div>
		</div>
	</div>
</div>

<script>
// Bootstrap globals that lib/RoomVisual.js expects to find on window.
// Must happen BEFORE the RoomVisual lib script below.
(function () {
	// Copy all DOJO_CONSTANTS onto window so RoomVisual.js can use STRUCTURE_SPAWN etc.
	if (window.DOJO_CONSTANTS) {
		Object.keys(window.DOJO_CONSTANTS).forEach(function (k) {
			window[k] = window.DOJO_CONSTANTS[k];
		});
	}
	// RoomVisual constructor shim — the lib extends RoomVisual.prototype
	window.RoomVisual = DojoSvgPrimitives.FakeRoomVisual;
	// Lodash partial shim used by connectRoads
	window._ = { some: function (c, p) { return c.some(p); } };
	// Game.time used by animatedPosition (not called in editor but must exist)
	window.Game = { time: 0 };
	// Node-ism in lib/RoomVisual.js: its Season block is guarded by
	// `if (global.SYMBOLS)` — alias global to window so the guard reads
	// undefined instead of throwing ReferenceError mid-file
	window.global = window;
})();
</script>
