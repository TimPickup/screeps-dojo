<script>
// ============================================================
// Map Editor application logic
// ============================================================
(function () {
	'use strict';

	var ROOM_SIZE = 50;
	var ROOM_NAME_RE = /^[WE]\d+[NS]\d+$/;
	// pixel size of each tile in the SVG viewBox units (viewBox is 50x50)
	var TILE = 1;

	// Terrain colors matching frameRenderer.js
	var TILE_COLORS = { '.': '#2b2b2b', '~': '#23311e', '#': '#111111' };
	var ROOM_BACKGROUND = '#2b2b2b';

	// Structural constants
	var STRUCTURE_TYPES = ['spawn','extension','tower','storage','terminal','link','lab',
		'factory','container','road','rampart','constructedWall','controller'];
	// roads, constructed walls and containers are unowned in Screeps — no owner.
	var OWNS_OWNER = ['spawn','extension','tower','storage','terminal','link','lab',
		'factory','rampart','controller'];
	// a controller/structure is "claimed" (owned) unless it's unclaimed/neutral.
	function isClaimed(owner) { return owner != null && owner !== 'neutral' && owner !== 'unclaimed'; }
	// stacking layers: a road (floor), a rampart (overlay) and one main structure
	// can share a tile. Selection prefers main > rampart > road.
	function structureLayer(type) { return type === 'road' ? 'floor' : (type === 'rampart' ? 'overlay' : 'main'); }
	var HAS_STORE = ['storage','terminal','container'];
	var STORE_CAPACITY = { storage: 1000000, terminal: 300000, container: 2000 };
	var SINGLE_INSTANCE = ['controller'];

	// ---- State ----
	var state = {
		room: 'W0N0',
		terrain: makeDefaultTerrain(),
		structures: [],   // {type, x, y, owner?, store?, level?, mineralType?, flagName?}
		flags: [],        // {name, x, y}
		extra: {},        // top-level map fields the editor doesn't model (e.g. creeps) — preserved verbatim across load/save
		selectedIdx: -1,  // index into structures or flags (selectedKind distinguishes)
		selectedKind: null, // 'structure' | 'flag'
		activeTool: 'select', // 'select' | 'terrain' | 'object'
		terrainBrush: '.',
		objectBrush: 'spawn',
		painting: false,
	};

	function makeDefaultTerrain() {
		var rows = [];
		for (var y = 0; y < ROOM_SIZE; y++) {
			var row = '';
			for (var x = 0; x < ROOM_SIZE; x++) {
				if (x === 0 || x === ROOM_SIZE - 1 || y === 0 || y === ROOM_SIZE - 1) {
					row += '#';
				} else {
					row += '.';
				}
			}
			rows.push(row);
		}
		return rows;
	}

	// ---- DOM refs ----
	var svg = document.getElementById('editor-svg');
	var roomInput = document.getElementById('room-name-input');
	var jsonTextarea = document.getElementById('json-textarea');
	var loadError = document.getElementById('load-error');
	var propsPanel = document.getElementById('props-panel');
	var noSelMsg = document.getElementById('no-sel-msg');
	var propOwnerRow = document.getElementById('prop-owner-row');
	var propStoreRow = document.getElementById('prop-store-row');
	var propCapacityRow = document.getElementById('prop-capacity-row');
	var propCapacity = document.getElementById('prop-capacity');
	var propFlagnameRow = document.getElementById('prop-flagname-row');
	var propLevelRow = document.getElementById('prop-level-row');
	var propMineralRow = document.getElementById('prop-mineral-row');
	var propDensityRow = document.getElementById('prop-density-row');
	var propOwner = document.getElementById('prop-owner');
	var propStore = document.getElementById('prop-store');
	var propFlagname = document.getElementById('prop-flagname');
	var propLevel = document.getElementById('prop-level');
	var propMineral = document.getElementById('prop-mineral');
	var propDensity = document.getElementById('prop-density');

	// Sources and minerals carry a 24-hex-char id in the canonical map format
	// (matching live-server object ids like "6a1c343dd05a7c237d188b4c") so creep
	// names that encode a source/mineral id still resolve. New ones authored in
	// the editor get a fresh random id.
	function randomObjectId() {
		var hex = '';
		if (window.crypto && window.crypto.getRandomValues) {
			var buf = new Uint8Array(12);
			window.crypto.getRandomValues(buf);
			for (var i = 0; i < buf.length; i++) hex += ('0' + buf[i].toString(16)).slice(-2);
		} else {
			while (hex.length < 24) hex += Math.floor(Math.random() * 16).toString(16);
		}
		return hex;
	}

	// ---- SVG helpers ----
	function svgEl(tag, attrs) {
		var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
		Object.keys(attrs).forEach(function (k) { el.setAttribute(k, attrs[k]); });
		return el;
	}

	// Convert RoomVisual elements into children of a <g> (foreign-parser trick).
	function appendElementsToG(g, elements) {
		elements.forEach(function (el) {
			var markup = DojoSvgPrimitives.elementToSvg(el);
			var wrapper = document.createElement('div');
			wrapper.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg">' + markup + '</svg>';
			var svgDoc = wrapper.firstChild;
			while (svgDoc.firstChild) g.appendChild(document.adoptNode(svgDoc.firstChild));
		});
		return g;
	}

	// Draw structure at (x,y) using RoomVisual lib -> elementToSvg, return <g> element
	function drawStructureSvg(type, x, y, extraAttrs) {
		var vis = new window.RoomVisual(state.room);
		if (type === 'source') {
			vis.circle(x, y, { radius: 0.35, fill: '#FFE87B', opacity: 0.9 });
		} else if (type === 'mineral') {
			vis.circle(x, y, { radius: 0.35, fill: '#ffffff', opacity: 0.6 });
		} else if (type === 'controller') {
			vis.circle(x, y, { radius: 0.45, fill: '#555', stroke: '#8FBB93', strokeWidth: 0.05, opacity: 0.9 });
		} else if (type === 'flag') {
			vis.poly([[x, y + 0.3], [x, y - 0.5], [x + 0.5, y - 0.3], [x, y - 0.1]],
				{ stroke: '#ffffff', strokeWidth: 0.08, fill: '#ff6666', opacity: 0.9 });
		} else {
			vis.structure(x, y, type);
		}
		var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
		if (extraAttrs) {
			Object.keys(extraAttrs).forEach(function (k) { g.setAttribute(k, extraAttrs[k]); });
		}
		appendElementsToG(g, vis.elements);
		return g;
	}

	// ---- Render ----
	var layers = {};

	function initSvg() {
		svg.innerHTML = '';

		// terrain layer
		var terrainG = svgEl('g', { id: 'layer-terrain' });
		svg.appendChild(terrainG);

		// grid layer
		var gridG = svgEl('g', { id: 'layer-grid' });
		svg.appendChild(gridG);

		// structures layer
		var structG = svgEl('g', { id: 'layer-structures' });
		svg.appendChild(structG);

		// hit-test overlay layer (for painting + selection)
		var overlayG = svgEl('g', { id: 'layer-overlay' });
		svg.appendChild(overlayG);

		layers.terrain = terrainG;
		layers.grid = gridG;
		layers.structures = structG;
		layers.overlay = overlayG;

		// Draw grid lines (same style as frameRenderer)
		var gridPath = '';
		for (var i = 1; i < ROOM_SIZE; i++) {
			gridPath += 'M ' + i + ' 0 V ' + ROOM_SIZE + ' M 0 ' + i + ' H ' + ROOM_SIZE + ' ';
		}
		var gridEl = svgEl('path', {
			d: gridPath.trim(),
			stroke: '#ffffff',
			'stroke-width': '0.02',
			opacity: '0.07',
			fill: 'none',
			'class': 'dojo-grid'
		});
		layers.grid.appendChild(gridEl);

		// Build hit-test rects (one per tile) — no repaint needed for these
		for (var ty = 0; ty < ROOM_SIZE; ty++) {
			for (var tx = 0; tx < ROOM_SIZE; tx++) {
				(function (cx, cy) {
					var rect = svgEl('rect', {
						x: cx, y: cy, width: 1, height: 1,
						fill: 'transparent',
						'class': 'tile-hit'
					});
					rect.addEventListener('mousedown', function (e) { onTileDown(cx, cy, e); });
					rect.addEventListener('mousemove', function (e) { onTileMove(cx, cy, e); });
					rect.addEventListener('mouseup', function () { state.painting = false; });
					layers.overlay.appendChild(rect);
				})(tx, ty);
			}
		}

		svg.addEventListener('mouseleave', function () { state.painting = false; });
	}

	function renderTerrain() {
		var t = layers.terrain;
		while (t.firstChild) t.removeChild(t.firstChild);

		// background
		t.appendChild(svgEl('rect', {
			x: 0, y: 0, width: ROOM_SIZE, height: ROOM_SIZE, fill: ROOM_BACKGROUND
		}));

		for (var y = 0; y < ROOM_SIZE; y++) {
			for (var x = 0; x < ROOM_SIZE; x++) {
				var ch = state.terrain[y][x];
				if (ch === '.') continue;
				t.appendChild(svgEl('rect', {
					x: x, y: y, width: 1, height: 1, fill: TILE_COLORS[ch]
				}));
			}
		}

		// Exit chevrons: outward arrows on every walkable border tile, same
		// visual language as the replay viewer (class dojo-exit).
		var exitGroup = svgEl('g', {
			'class': 'dojo-exit', stroke: '#9bd49b', 'stroke-width': '0.08',
			opacity: '0.5', fill: 'none'
		});
		function addChevron(x1, y1, x2, y2, x3, y3) {
			exitGroup.appendChild(svgEl('path', {
				d: 'M ' + x1 + ' ' + y1 + ' L ' + x2 + ' ' + y2 + ' L ' + x3 + ' ' + y3
			}));
		}
		var last = ROOM_SIZE - 1;
		for (var i = 0; i < ROOM_SIZE; i++) {
			if (state.terrain[i][0] !== '#') addChevron(0.4, i + 0.25, 0.1, i + 0.5, 0.4, i + 0.75);
			if (state.terrain[i][last] !== '#') addChevron(last + 0.6, i + 0.25, last + 0.9, i + 0.5, last + 0.6, i + 0.75);
			if (state.terrain[0][i] !== '#') addChevron(i + 0.25, 0.4, i + 0.5, 0.1, i + 0.75, 0.4);
			if (state.terrain[last][i] !== '#') addChevron(i + 0.25, last + 0.6, i + 0.5, last + 0.9, i + 0.75, last + 0.6);
		}
		t.appendChild(exitGroup);
	}

	function renderStructures() {
		var sl = layers.structures;
		while (sl.firstChild) sl.removeChild(sl.firstChild);

		var CONNECTED = { road: 1, constructedWall: 1, rampart: 1 };
		state.structures.forEach(function (obj, idx) {
			var selected = (state.selectedKind === 'structure' && state.selectedIdx === idx);
			var g;
			if (CONNECTED[obj.type]) {
				// road/wall/rampart visuals come from the connected overlay below;
				// here we just need a transparent hit area so they're selectable
				// (and so the overlay isn't drawn twice / showing through ramparts).
				g = svgEl('g', { 'data-kind': 'structure', 'data-idx': idx, cursor: 'pointer' });
				g.appendChild(svgEl('rect', { x: obj.x, y: obj.y, width: 1, height: 1, fill: 'transparent' }));
			} else {
				g = drawStructureSvg(obj.type, obj.x, obj.y, {
					'data-kind': 'structure',
					'data-idx': idx,
					cursor: 'pointer',
					opacity: selected ? '0.7' : '1'
				});
			}
			if (selected) {
				// highlight ring
				var ring = svgEl('circle', {
					cx: obj.x + 0.5, cy: obj.y + 0.5, r: '0.6',
					fill: 'none', stroke: '#65fd62', 'stroke-width': '0.07', opacity: '0.9'
				});
				g.appendChild(ring);
			}
			g.addEventListener('mousedown', function (e) {
				if (state.activeTool === 'object' && state.objectBrush === 'eraser') return;
				e.stopPropagation();
				selectObject('structure', idx);
			});
			sl.appendChild(g);
		});

		state.flags.forEach(function (flag, idx) {
			var selected = (state.selectedKind === 'flag' && state.selectedIdx === idx);
			var g = drawStructureSvg('flag', flag.x, flag.y, {
				'data-kind': 'flag',
				'data-idx': idx,
				cursor: 'pointer',
				opacity: selected ? '0.7' : '1'
			});
			if (selected) {
				var ring = svgEl('circle', {
					cx: flag.x + 0.5, cy: flag.y + 0.5, r: '0.55',
					fill: 'none', stroke: '#65fd62', 'stroke-width': '0.07', opacity: '0.9'
				});
				g.appendChild(ring);
			}
			g.addEventListener('mousedown', function (e) {
				if (state.activeTool === 'object' && state.objectBrush === 'eraser') return;
				e.stopPropagation();
				selectObject('flag', idx);
			});
			sl.appendChild(g);
		});

		// Connected overlay (non-interactive, on top): roads use the lib's
		// connectRoads() like the replay viewer; walls + ramparts use connected
		// "pill" blobs (orthogonal neighbours merge; diagonals don't).
		var cg = svgEl('g', { 'pointer-events': 'none' });
		var roads = state.structures.filter(function (o) { return o.type === 'road'; });
		if (roads.length) {
			var rv = new window.RoomVisual(state.room);
			roads.forEach(function (o) { rv.structure(o.x, o.y, 'road'); });
			if (typeof rv.connectRoads === 'function') rv.connectRoads();
			appendElementsToG(cg, rv.elements);
		}
		appendConnectedBarriers(cg, state.structures);
		sl.appendChild(cg);
	}

	// Renders constructed walls and ramparts as connected blobs. Orthogonally
	// adjacent tiles merge into a pill/network; ramparts are translucent green
	// (mine) or red (anyone else's), walls are solid dark.
	function drawBarrierGroup(cg, tiles, fill, opacity) {
		if (!tiles.length) return;
		var set = {};
		tiles.forEach(function (t) { set[t.x + ',' + t.y] = true; });
		var inner = svgEl('g', { opacity: String(opacity) }); // group opacity = no overlap darkening
		var half = 0.42;
		tiles.forEach(function (t) {
			inner.appendChild(svgEl('rect', { x: t.x + 0.5 - half, y: t.y + 0.5 - half, width: 2 * half, height: 2 * half, rx: '0.16', ry: '0.16', fill: fill }));
			if (set[(t.x + 1) + ',' + t.y]) inner.appendChild(svgEl('rect', { x: t.x + 0.5, y: t.y + 0.5 - half, width: 1, height: 2 * half, fill: fill }));
			if (set[t.x + ',' + (t.y + 1)]) inner.appendChild(svgEl('rect', { x: t.x + 0.5 - half, y: t.y + 0.5, width: 2 * half, height: 1, fill: fill }));
		});
		cg.appendChild(inner);
	}

	function appendConnectedBarriers(cg, structures) {
		drawBarrierGroup(cg, structures.filter(function (o) { return o.type === 'constructedWall'; }), '#111417', 1);
		drawBarrierGroup(cg, structures.filter(function (o) { return o.type === 'rampart' && !(o.owner && o.owner !== 'me'); }), '#46d160', 0.32);
		drawBarrierGroup(cg, structures.filter(function (o) { return o.type === 'rampart' && o.owner && o.owner !== 'me'; }), '#e85050', 0.32);
	}

	function fullRender() {
		renderTerrain();
		renderStructures();
		updateJsonExport();
	}

	// ---- Selection / Properties ----
	function selectObject(kind, idx) {
		state.selectedKind = kind;
		state.selectedIdx = idx;
		showProps();
		renderStructures();
	}

	function clearSelection() {
		state.selectedKind = null;
		state.selectedIdx = -1;
		propsPanel.classList.add('hidden');
		noSelMsg.style.display = 'block';
		renderStructures();
	}

	function showProps() {
		propsPanel.classList.remove('hidden');
		noSelMsg.style.display = 'none';
		// hide all rows first
		[propOwnerRow, propStoreRow, propCapacityRow, propFlagnameRow, propLevelRow, propMineralRow, propDensityRow].forEach(function (r) {
			r.style.display = 'none';
		});

		if (state.selectedKind === 'flag') {
			var flag = state.flags[state.selectedIdx];
			propFlagnameRow.style.display = 'flex';
			propFlagname.value = flag.name || '';
			return;
		}

		var obj = state.structures[state.selectedIdx];
		if (!obj) return;

		if (OWNS_OWNER.indexOf(obj.type) !== -1) {
			propOwnerRow.style.display = 'flex';
			// controllers default to unclaimed; everything else defaults to 'me'.
			// ('neutral' is the legacy value for an unclaimed controller.)
			var defaultOwner = obj.type === 'controller' ? 'unclaimed' : 'me';
			propOwner.value = obj.owner == null ? defaultOwner : (obj.owner === 'neutral' ? 'unclaimed' : obj.owner);
		}
		if (HAS_STORE.indexOf(obj.type) !== -1) {
			propStoreRow.style.display = 'flex';
			propStore.value = JSON.stringify(obj.store || {});
			updateCapacityDisplay(obj);
		}
		// A controller's level only applies when it's claimed; an unclaimed
		// controller is always level 0 (so the level field is hidden).
		if (obj.type === 'controller' && isClaimed(obj.owner)) {
			propLevelRow.style.display = 'flex';
			propLevel.value = obj.level != null ? obj.level : 1;
		}
		if (obj.type === 'mineral') {
			propMineralRow.style.display = 'flex';
			propMineral.value = obj.mineralType || 'H';
			propDensityRow.style.display = 'flex';
			propDensity.value = String(obj.density || 3);
		}
	}

	// Shows "used / capacity" for a store-bearing structure; flags over-capacity.
	function updateCapacityDisplay(obj) {
		propCapacityRow.style.display = 'flex';
		var cap = STORE_CAPACITY[obj.type] || 0;
		var used = 0, st = obj.store || {};
		for (var k in st) used += Number(st[k]) || 0;
		var over = cap && used > cap;
		propCapacity.textContent = used.toLocaleString() + ' / ' + cap.toLocaleString() + (over ? '  ⚠ over capacity' : '');
		propCapacity.style.color = over ? '#cc5555' : '#888';
	}

	// ---- Tile interaction ----
	// Returns the object sitting on a tile (structures take priority over flags).
	function findObjectAt(x, y) {
		// prefer the main structure, then rampart, then road (the top-most thing).
		var rank = { main: 2, overlay: 1, floor: 0 };
		var best = -1, bestRank = -1;
		state.structures.forEach(function (o, i) {
			if (o.x !== x || o.y !== y) return;
			var r = rank[structureLayer(o.type)];
			if (r > bestRank) { bestRank = r; best = i; }
		});
		if (best !== -1) return { kind: 'structure', idx: best };
		var fi = state.flags.findIndex(function (f) { return f.x === x && f.y === y; });
		if (fi !== -1) return { kind: 'flag', idx: fi };
		return null;
	}

	function onTileDown(x, y, e) {
		if (e.button !== 0) return;
		// select is a single click (no drag-paint); paint/erase tools drag.
		state.painting = state.activeTool !== 'select';
		applyTool(x, y);
	}

	function onTileMove(x, y, e) {
		if (!state.painting) return;
		if (!(e.buttons & 1)) { state.painting = false; return; }
		applyTool(x, y);
	}

	function applyTool(x, y) {
		if (state.activeTool === 'select') {
			var hit = findObjectAt(x, y);
			if (hit) selectObject(hit.kind, hit.idx); else clearSelection();
		} else if (state.activeTool === 'terrain') {
			paintTerrain(x, y, state.terrainBrush);
		} else if (state.activeTool === 'object') {
			if (state.objectBrush === 'eraser') {
				eraseAt(x, y);
			} else {
				placeObject(x, y, state.objectBrush);
			}
		}
	}

	function paintTerrain(x, y, ch) {
		// Border auto-wall: if border-wall is on and we're on the border, force '#'
		var borderWall = document.getElementById('border-wall-cb').checked;
		var actualCh = ch;
		if (borderWall && (x === 0 || x === ROOM_SIZE - 1 || y === 0 || y === ROOM_SIZE - 1)) {
			actualCh = '#';
		}
		var row = state.terrain[y];
		if (row[x] === actualCh) return;
		state.terrain[y] = row.slice(0, x) + actualCh + row.slice(x + 1);
		renderTerrain();
		updateJsonExport();
	}

	function placeObject(x, y, type) {
		// Single-instance types: remove any existing one first
		if (SINGLE_INSTANCE.indexOf(type) !== -1) {
			state.structures = state.structures.filter(function (o) { return o.type !== type; });
		}

		if (type === 'flag') {
			// Allow multiple flags but not stacked
			var existing = state.flags.findIndex(function (f) { return f.x === x && f.y === y; });
			if (existing !== -1) return;
			state.flags.push({ name: 'flag' + state.flags.length, x: x, y: y });
		} else {
			// A tile can hold three layers at once: a road (floor), a rampart
			// (overlay), and one "main" structure. Placing into a layer only
			// replaces what's already in that layer — so roads go under and
			// ramparts go over any structure.
			var layer = structureLayer(type);
			state.structures = state.structures.filter(function (o) {
				return !(o.x === x && o.y === y && structureLayer(o.type) === layer);
			});

			var obj = { type: type, x: x, y: y };
			// controllers default to UNCLAIMED (no owner); other ownable structures
			// default to 'me'. roads/walls/containers are never owned.
			if (OWNS_OWNER.indexOf(type) !== -1 && type !== 'controller') obj.owner = 'me';
			if (HAS_STORE.indexOf(type) !== -1) obj.store = {};
			if (type === 'controller') obj.level = 0;
			if (type === 'mineral') { obj.mineralType = 'H'; obj.density = 3; }
			if (type === 'source' || type === 'mineral') obj.id = randomObjectId();
			state.structures.push(obj);
		}

		clearSelection();
		renderStructures();
		updateJsonExport();
	}

	function eraseAt(x, y) {
		var changed = false;
		var si = state.structures.findIndex(function (o) { return o.x === x && o.y === y; });
		if (si !== -1) { state.structures.splice(si, 1); changed = true; }
		var fi = state.flags.findIndex(function (f) { return f.x === x && f.y === y; });
		if (fi !== -1) { state.flags.splice(fi, 1); changed = true; }
		if (changed) {
			clearSelection();
			renderStructures();
			updateJsonExport();
		}
	}

	// ---- JSON export/import ----
	function buildMapJson() {
		// Sources, minerals and the controller are modelled internally as
		// structures[] entries (so they render and are selectable), but the
		// canonical map format the engine consumes emits them as top-level
		// `sources`/`minerals` arrays and a top-level `controller`. Partition
		// them out here so editor output matches a live-server export.
		// fields the editor owns for a structure; everything else on the model
		// object is preserved verbatim (see the structure branch below).
		var STRUCT_MANAGED = { type: 1, x: 1, y: 1, owner: 1, store: 1, level: 1,
			id: 1, mineralType: 1, density: 1, energy: 1, energyCapacity: 1, mineralAmount: 1 };
		var structures = [];
		var sources = [];
		var minerals = [];
		var controller = null;
		state.structures.forEach(function (o) {
			if (o.type === 'source') {
				if (!o.id) o.id = randomObjectId();
				var src = { x: o.x, y: o.y, id: o.id };
				if (o.energy != null) src.energy = o.energy;
				if (o.energyCapacity != null) src.energyCapacity = o.energyCapacity;
				sources.push(src);
			} else if (o.type === 'mineral') {
				if (!o.id) o.id = randomObjectId();
				var min = { x: o.x, y: o.y, mineralType: o.mineralType || 'H', density: o.density || 3, id: o.id };
				if (o.mineralAmount != null) min.mineralAmount = o.mineralAmount;
				minerals.push(min);
			} else if (o.type === 'controller') {
				controller = { x: o.x, y: o.y };
				if (o.owner != null) controller.owner = o.owner;
				if (o.level != null && o.level !== 0) controller.level = o.level;
			} else {
				var s = { type: o.type, x: o.x, y: o.y };
				// Carry through fields the editor doesn't model (hits, name,
				// notifyWhenAttacked, storeCapacity*, ... on imported structures) so a
				// load/save round-trip is lossless — otherwise opening an imported map
				// and saving would silently strip its structure metadata. Editor-managed
				// fields (owner/store/level) are normalised explicitly below.
				Object.keys(o).forEach(function (k) {
					if (!STRUCT_MANAGED[k]) s[k] = o[k];
				});
				if (o.owner != null) s.owner = o.owner;
				if (o.store != null && Object.keys(o.store).length > 0) s.store = o.store;
				if (o.level != null && o.level !== 0) s.level = o.level;
				structures.push(s);
			}
		});
		var map = {
			room: state.room,
			terrain: state.terrain.slice(),
			structures: structures,
		};
		map.flags = state.flags.map(function (f) {
			return { name: f.name, x: f.x, y: f.y };
		});
		if (sources.length) map.sources = sources;
		if (minerals.length) map.minerals = minerals;
		if (controller) map.controller = controller;
		// Re-emit fields the editor doesn't model (creeps, etc.) captured on load,
		// after the modelled fields so the canonical key order stays stable.
		Object.keys(state.extra).forEach(function (k) { map[k] = state.extra[k]; });
		return map;
	}

	// when true, skip rewriting the textarea (so live-editing the JSON doesn't
	// fight the user's cursor) — but the embed bridge still posts the change.
	var suppressJsonWrite = false;
	function updateJsonExport() {
		if (!suppressJsonWrite) jsonTextarea.value = JSON.stringify(buildMapJson(), null, '\t');
	}

	function loadMapJson(json) {
		try {
			var map = typeof json === 'string' ? JSON.parse(json) : json;
			if (!map.room || !Array.isArray(map.terrain) || map.terrain.length !== ROOM_SIZE) {
				throw new Error('invalid map: missing room or terrain (50 rows required)');
			}
			for (var i = 0; i < ROOM_SIZE; i++) {
				if (typeof map.terrain[i] !== 'string' || map.terrain[i].length !== ROOM_SIZE) {
					throw new Error('terrain row ' + i + ' must be a 50-char string');
				}
			}
			state.room = map.room;
			state.terrain = map.terrain.slice();
			state.structures = (map.structures || []).map(function (s) {
				var o = Object.assign({}, s);
				// a source/mineral authored the legacy way (inside structures[])
				// gets an id so it round-trips into the top-level array on save
				if ((o.type === 'source' || o.type === 'mineral') && !o.id) o.id = randomObjectId();
				return o;
			});
			// Fold the canonical top-level sources/minerals/controller into the
			// structures[] model so they render and can be edited. On save
			// buildMapJson() partitions them back out to top level.
			(map.sources || []).forEach(function (s) {
				var o = { type: 'source', x: s.x, y: s.y, id: s.id || randomObjectId() };
				if (s.energy != null) o.energy = s.energy;
				if (s.energyCapacity != null) o.energyCapacity = s.energyCapacity;
				state.structures.push(o);
			});
			(map.minerals || []).forEach(function (m) {
				var o = { type: 'mineral', x: m.x, y: m.y, id: m.id || randomObjectId(),
					mineralType: m.mineralType || 'H', density: m.density || 3 };
				if (m.mineralAmount != null) o.mineralAmount = m.mineralAmount;
				state.structures.push(o);
			});
			// top-level controller wins; skip if a structures[] controller already exists
			if (map.controller && !state.structures.some(function (o) { return o.type === 'controller'; })) {
				var c = map.controller;
				var co = { type: 'controller', x: c.x, y: c.y };
				if (c.owner != null) co.owner = c.owner;
				if (c.level != null) co.level = c.level;
				state.structures.push(co);
			}
			state.flags = (map.flags || []).map(function (f) {
				return { name: f.name, x: f.x, y: f.y };
			});
			// Stash any top-level fields the editor doesn't model (creeps, and
			// anything added to the map format later) so a load/save round-trip
			// never silently drops them. sources/minerals/controller are modelled
			// (folded into structures[] above), so they're excluded here.
			var MODELLED = { room: 1, terrain: 1, structures: 1, flags: 1, sources: 1, minerals: 1, controller: 1 };
			state.extra = {};
			Object.keys(map).forEach(function (k) { if (!MODELLED[k]) state.extra[k] = map[k]; });
			roomInput.value = state.room;
			clearSelection();
			fullRender();
			loadError.textContent = '';
		} catch (err) {
			loadError.textContent = 'Error: ' + err.message;
		}
	}

	// ---- UI wiring ----

	// Tab switching
	document.querySelectorAll('.tab-btn').forEach(function (btn) {
		btn.addEventListener('click', function () {
			document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
			document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
			btn.classList.add('active');
			document.getElementById(btn.dataset.tab + '-pane').classList.add('active');
		});
	});

	// Room name validation
	roomInput.addEventListener('input', function () {
		var v = roomInput.value.trim();
		if (ROOM_NAME_RE.test(v)) {
			roomInput.classList.remove('invalid');
			state.room = v;
			updateJsonExport();
		} else {
			roomInput.classList.add('invalid');
		}
	});

	function clearPaletteActive() {
		document.querySelectorAll('.terrain-btn,.obj-btn,.eraser-btn,.tool-btn').forEach(function (b) { b.classList.remove('active'); });
	}

	// Select / edit tool
	document.querySelectorAll('.tool-btn').forEach(function (btn) {
		btn.addEventListener('click', function () {
			clearPaletteActive();
			btn.classList.add('active');
			state.activeTool = 'select';
		});
	});

	// Terrain palette
	document.querySelectorAll('.terrain-btn').forEach(function (btn) {
		btn.addEventListener('click', function () {
			clearPaletteActive();
			btn.classList.add('active');
			state.terrainBrush = btn.dataset.terrain;
			state.activeTool = 'terrain';
		});
	});

	// Object palette
	document.querySelectorAll('.obj-btn, .eraser-btn').forEach(function (btn) {
		btn.addEventListener('click', function () {
			clearPaletteActive();
			btn.classList.add('active');
			state.objectBrush = btn.dataset.obj;
			state.activeTool = 'object';
		});
	});

	// Properties change listeners
	propOwner.addEventListener('change', function () {
		if (state.selectedKind !== 'structure') return;
		var obj = state.structures[state.selectedIdx];
		obj.owner = propOwner.value;
		// Keep a controller's level consistent with its claimed state: claiming
		// sets level 1 (if it was 0), unclaiming forces level 0.
		if (obj.type === 'controller') {
			if (isClaimed(obj.owner)) { if (!obj.level) obj.level = 1; }
			else { obj.level = 0; }
			showProps(); // re-evaluate which rows show (level only when claimed)
		}
		renderStructures();
		updateJsonExport();
	});

	propStore.addEventListener('input', function () {
		if (state.selectedKind !== 'structure') return;
		try {
			var v = JSON.parse(propStore.value);
			state.structures[state.selectedIdx].store = v;
			propStore.classList.remove('json-invalid');
			updateCapacityDisplay(state.structures[state.selectedIdx]);
			updateJsonExport();
		} catch (e) {
			propStore.classList.add('json-invalid');
		}
	});

	propFlagname.addEventListener('input', function () {
		if (state.selectedKind !== 'flag') return;
		state.flags[state.selectedIdx].name = propFlagname.value;
		updateJsonExport();
	});

	propLevel.addEventListener('input', function () {
		if (state.selectedKind !== 'structure') return;
		state.structures[state.selectedIdx].level = Number(propLevel.value);
		updateJsonExport();
	});

	propMineral.addEventListener('change', function () {
		if (state.selectedKind !== 'structure') return;
		state.structures[state.selectedIdx].mineralType = propMineral.value;
		updateJsonExport();
	});

	propDensity.addEventListener('change', function () {
		if (state.selectedKind !== 'structure') return;
		state.structures[state.selectedIdx].density = Number(propDensity.value);
		updateJsonExport();
	});

	document.getElementById('delete-btn').addEventListener('click', function () {
		if (state.selectedKind === 'structure') {
			state.structures.splice(state.selectedIdx, 1);
		} else if (state.selectedKind === 'flag') {
			state.flags.splice(state.selectedIdx, 1);
		}
		clearSelection();
		renderStructures();
		updateJsonExport();
	});

	// Import
	document.getElementById('load-btn').addEventListener('click', function () {
		loadMapJson(jsonTextarea.value);
	});

	// Live two-way editing: typing in the JSON re-renders the map (debounced),
	// showing parse/validation errors inline WITHOUT clobbering what you type.
	var jsonEditTimer = null;
	jsonTextarea.addEventListener('input', function () {
		clearTimeout(jsonEditTimer);
		jsonEditTimer = setTimeout(function () {
			suppressJsonWrite = true;
			loadMapJson(jsonTextarea.value);
			suppressJsonWrite = false;
		}, 350);
	});

	document.getElementById('file-input').addEventListener('change', function (e) {
		var file = e.target.files[0];
		if (!file) return;
		var reader = new FileReader();
		reader.onload = function (ev) { loadMapJson(ev.target.result); };
		reader.readAsText(file);
	});

	// Export
	document.getElementById('download-btn').addEventListener('click', function () {
		var blob = new Blob([jsonTextarea.value], { type: 'application/json' });
		var a = document.createElement('a');
		a.href = URL.createObjectURL(blob);
		a.download = 'map.json';
		a.click();
		URL.revokeObjectURL(a.href);
	});

	// Click on empty svg canvas to deselect / apply terrain
	svg.addEventListener('mousedown', function (e) {
		if (e.target === svg || e.target.id === 'layer-terrain' || e.target.id === 'layer-grid') {
			clearSelection();
		}
	});

	// ---- Init ----
	initSvg();
	fullRender();

	// ---- Dojo embed bridge ----
	// When loaded inside the GUI's Edit tab (?embed=1), hide the standalone
	// chrome and talk to the parent: receive a map to edit, post changes back.
	(function () {
		var params = new URLSearchParams(location.search);
		if (!params.has('embed')) return;
		var tabsEl = document.getElementById('tabs'); if (tabsEl) tabsEl.style.display = 'none';
		// Raw-JSON editing lives in the host app's Monaco editor (its Visual/JSON
		// toggle), so the standalone JSON panel + Load/Download buttons stay hidden
		// in embed mode. We sync with the host over postMessage below.
		var bottomEl = document.getElementById('bottom-panel'); if (bottomEl) bottomEl.style.display = 'none';
		var origUpdate = updateJsonExport;
		updateJsonExport = function () {
			origUpdate.apply(this, arguments);
			try { parent.postMessage({ type: 'dojoMapChanged', map: jsonTextarea.value }, '*'); } catch (e) { /* ignore */ }
		};
		window.addEventListener('message', function (e) {
			if (e.data && e.data.type === 'dojoLoadMap' && e.data.map) {
				loadMapJson(e.data.map);
			}
		});
		try { parent.postMessage({ type: 'dojoEditorReady' }, '*'); } catch (e) { /* ignore */ }
	})();

})();
</script>

<script>
// ============================================================
// Replay Viewer application logic
// ============================================================
(function () {
	'use strict';

	// ---- Constants (mirror frameRenderer.js visual language) ----
	var TILE_COLORS = { '.': '#2b2b2b', '~': '#23311e', '#': '#111111' };
	var ROOM_BACKGROUND = '#2b2b2b';
	var BOT_COLOR = '#65fd62';
	var HOSTILE_COLOR = '#fd6262';
	var NPC_USER_IDS = ['2', '3'];
	var CREEP_SIZE_TILES = 1.25;
	var PIXELS_PER_ROOM = 600;
	var ROOM_TILES = 50;

	// ---- Parse the inlined invader SVG ----
	var invaderAsset = (function () {
		var raw = window.DOJO_INVADER_SVG || '';
		var vbMatch = raw.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
		var innerMatch = raw.match(/<svg[^>]*>([\s\S]*)<\/svg>/);
		if (!vbMatch || !innerMatch) return null;
		return {
			inner: innerMatch[1],
			width: Number(vbMatch[1]),
			height: Number(vbMatch[2])
		};
	})();

	function invaderSvg(x, y, opacity, angleDegrees) {
		if (!invaderAsset) return '';
		var size = 0.95;
		var scale = size / invaderAsset.width;
		var drawWidth = invaderAsset.width * scale;
		var drawHeight = invaderAsset.height * scale;
		var cx = (invaderAsset.width / 2).toFixed(3);
		var cy = (invaderAsset.height / 2).toFixed(3);
		var angle = angleDegrees !== undefined ? angleDegrees : 0;
		return '<g class="dojo-invader" opacity="' + opacity + '" transform="translate('
			+ (x + 0.5 - drawWidth / 2).toFixed(3) + ',' + (y + 0.5 - drawHeight / 2).toFixed(3)
			+ ') scale(' + scale.toFixed(4) + ') rotate(' + angle + ' ' + cx + ' ' + cy + ')">'
			+ invaderAsset.inner + '</g>';
	}

	// creepFacing: ported from src/render/frameRenderer.js.
	// Returns the facing angle in degrees for a creep at frameIndex.
	// An ACTION target on the upcoming tick (next frame's actionLog — harvest,
	// attack, upgrade, heal, ...) takes priority: a creep working a source faces
	// the source even while standing still. Otherwise looks at the current
	// transition (frames[frameIndex] -> frames[frameIndex+1]); if no movement
	// there, scans backward for the most recent tick with movement. Cross-room
	// steps compare layout-adjusted world coordinates, so a step east through a
	// room seam still faces 0 degrees.
	// Returns fallbackAngle (default 0, faces right) if the creep never moved.
	var ACTION_FACING_KEYS = ['harvest', 'attack', 'upgradeController', 'heal',
		'rangedAttack', 'rangedHeal', 'build'];
	function creepFacing(recording, layout, frameIndex, objectId, fallbackAngle) {
		var frames = recording.frames;

		function posAt(fi) {
			var frame = frames[fi];
			if (!frame) return null;
			for (var i = 0; i < frame.objects.length; i++) {
				if (frame.objects[i]._id === objectId) return frame.objects[i];
			}
			return null;
		}

		// World coordinates: room-local position shifted by the room's layout
		// offset. Null when the room isn't part of the rendered layout.
		function worldPos(obj) {
			var off = layout.offsets[obj.room];
			if (!off) return null;
			return { x: obj.x + off.col * ROOM_TILES, y: obj.y + off.row * ROOM_TILES };
		}

		function angleBetween(a, b) {
			if (a.room === b.room) {
				if (a.x === b.x && a.y === b.y) return null;
				return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
			}
			var wa = worldPos(a);
			var wb = worldPos(b);
			if (!wa || !wb || (wa.x === wb.x && wa.y === wb.y)) return null;
			return Math.atan2(wb.y - wa.y, wb.x - wa.x) * 180 / Math.PI;
		}

		// ACTION target wins over movement: the actionLog describing this
		// transition rides the NEXT frame's object (same convention as the
		// effect beams). Targets are room-local {x,y}; angleBetween handles a
		// target room when present (layout-aware).
		var actor = posAt(frameIndex + 1);
		if (actor && actor.actionLog) {
			for (var ak = 0; ak < ACTION_FACING_KEYS.length; ak++) {
				var target = actor.actionLog[ACTION_FACING_KEYS[ak]];
				if (target && typeof target.x === 'number' && typeof target.y === 'number') {
					var actionAngle = angleBetween(actor,
						{ room: target.room || actor.room, x: target.x, y: target.y });
					if (actionAngle !== null) return actionAngle;
				}
			}
		}

		// Check current transition first
		var curr = posAt(frameIndex);
		var next = posAt(frameIndex + 1);
		if (curr && next) {
			var angle = angleBetween(curr, next);
			if (angle !== null) return angle;
		}

		// Scan backward for most recent movement
		for (var k = frameIndex; k >= 1; k--) {
			var a = posAt(k - 1);
			var b = posAt(k);
			if (a && b) {
				var past = angleBetween(a, b);
				if (past !== null) return past;
			}
		}

		return fallbackAngle !== undefined ? fallbackAngle : 0;
	}

	// ---- roomNameToXY (ported from mapFormat.js; credited to frameRenderer.js computeLayout) ----
	var ROOM_NAME_PATTERN = /^([WE])(\d+)([NS])(\d+)$/;
	function roomNameToXY(name) {
		var m = ROOM_NAME_PATTERN.exec(name);
		if (!m) return { x: 0, y: 0 };
		var x = m[1] === 'W' ? -Number(m[2]) - 1 : Number(m[2]);
		var y = m[3] === 'N' ? -Number(m[4]) - 1 : Number(m[4]);
		return { x: x, y: y };
	}

	// computeLayout: ported from frameRenderer.js (credit: src/render/frameRenderer.js)
	function computeLayout(roomNames) {
		var positions = roomNames.map(function (name) {
			var xy = roomNameToXY(name);
			return { name: name, x: xy.x, y: xy.y };
		});
		var minX = Math.min.apply(null, positions.map(function (p) { return p.x; }));
		var minY = Math.min.apply(null, positions.map(function (p) { return p.y; }));
		var offsets = {};
		var columns = 1, rows = 1;
		for (var i = 0; i < positions.length; i++) {
			var p = positions[i];
			var col = p.x - minX;
			var row = p.y - minY;
			offsets[p.name] = { col: col, row: row };
			if (col + 1 > columns) columns = col + 1;
			if (row + 1 > rows) rows = row + 1;
		}
		return { offsets: offsets, columns: columns, rows: rows };
	}

	function lerp(a, b, t) { return a + (b - a) * t; }

	// ---- SVG element builder ----
	function svgNS(tag, attrs) {
		var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
		Object.keys(attrs).forEach(function (k) { el.setAttribute(k, attrs[k]); });
		return el;
	}

	// ---- FakeRoomVisual -> SVG string (uses DojoSvgPrimitives) ----
	function visualToSvgString(vis) {
		return vis.elements.map(function (el) {
			return DojoSvgPrimitives.elementToSvg(el);
		}).join('');
	}

	// ---- Terrain SVG string for a room ----
	function terrainHtml(rows) {
		var parts = ['<rect x="0" y="0" width="50" height="50" fill="' + ROOM_BACKGROUND + '"/>'];
		for (var y = 0; y < ROOM_TILES; y++) {
			for (var x = 0; x < ROOM_TILES; x++) {
				var ch = rows[y][x];
				if (ch === '.') continue;
				parts.push('<rect x="' + x + '" y="' + y + '" width="1" height="1" fill="'
					+ (TILE_COLORS[ch] || ROOM_BACKGROUND) + '"/>');
			}
		}
		var gridPath = '';
		for (var i = 1; i < ROOM_TILES; i++) {
			gridPath += 'M ' + i + ' 0 V 50 M 0 ' + i + ' H 50 ';
		}
		parts.push('<path class="dojo-grid" d="' + gridPath.trim()
			+ '" stroke="#ffffff" stroke-width="0.02" opacity="0.07" fill="none"/>');
		parts.push(exitArrowsHtml(rows));
		return parts.join('');
	}

	// Outward chevrons on every walkable border tile so room exits read at a
	// glance: left edge points left, right edge right, top up, bottom down.
	function exitArrowsHtml(rows) {
		var chevrons = [];
		function chev(x1, y1, x2, y2, x3, y3) {
			chevrons.push('<path d="M ' + x1 + ' ' + y1 + ' L ' + x2 + ' ' + y2
				+ ' L ' + x3 + ' ' + y3 + '"/>');
		}
		var last = ROOM_TILES - 1;
		for (var i = 0; i < ROOM_TILES; i++) {
			if (rows[i][0] !== '#') chev(0.4, i + 0.25, 0.1, i + 0.5, 0.4, i + 0.75);
			if (rows[i][last] !== '#') chev(last + 0.6, i + 0.25, last + 0.9, i + 0.5, last + 0.6, i + 0.75);
			if (rows[0][i] !== '#') chev(i + 0.25, 0.4, i + 0.5, 0.1, i + 0.75, 0.4);
			if (rows[last][i] !== '#') chev(i + 0.25, last + 0.6, i + 0.5, last + 0.9, i + 0.75, last + 0.6);
		}
		if (!chevrons.length) return '';
		return '<g class="dojo-exit" stroke="#9bd49b" stroke-width="0.08" opacity="0.5" fill="none">'
			+ chevrons.join('') + '</g>';
	}

	// ---- Controller arc helper (same math style as DojoCreepSprite's arcs:
	// angle 0 = top, degrees increase clockwise) ----
	function ctrlPointOnCircle(cx, cy, radius, angleDeg) {
		var rad = angleDeg * Math.PI / 180;
		return { x: cx + Math.sin(rad) * radius, y: cy - Math.cos(rad) * radius };
	}

	function ctrlArcSvg(cx, cy, radius, startAngle, endAngle, color, width) {
		if (Math.abs(endAngle - startAngle) <= 0.001) return '';
		if (Math.abs(endAngle - startAngle) >= 359.999) {
			return '<circle cx="' + cx + '" cy="' + cy + '" r="' + radius.toFixed(3)
				+ '" fill="none" stroke="' + color + '" stroke-width="' + width.toFixed(3) + '"/>';
		}
		var start = ctrlPointOnCircle(cx, cy, radius, startAngle);
		var end = ctrlPointOnCircle(cx, cy, radius, endAngle);
		var largeArcFlag = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
		return '<path d="M ' + start.x.toFixed(3) + ' ' + start.y.toFixed(3)
			+ ' A ' + radius.toFixed(3) + ' ' + radius.toFixed(3) + ' 0 ' + largeArcFlag + ' 1 '
			+ end.x.toFixed(3) + ' ' + end.y.toFixed(3)
			+ '" fill="none" stroke="' + color + '" stroke-width="' + width.toFixed(3)
			+ '" stroke-linecap="butt"/>';
	}

	// Controller: dark base + progress disc + rim arc (under creeps) and the
	// white level number (drawn last, on top of creeps).
	function controllerHtml(obj) {
		// only skip the loader's (0,0) scaffold controller; draw real controllers
		// at their true position even when neutral or reserved (no owner / level 0)
		if (obj.x === 0 && obj.y === 0 && !obj.user && !(obj.level > 0)) return null;
		var cx = obj.x + 0.5;
		var cy = obj.y + 0.5;
		var parts = [];
		parts.push('<circle cx="' + cx + '" cy="' + cy
			+ '" r="0.6" fill="#181818" stroke="#888888" stroke-width="0.05"/>');
		var levels = window.CONTROLLER_LEVELS || {};
		var required = levels[obj.level];
		var fraction = required > 0
			? Math.max(0, Math.min(1, (obj.progress || 0) / required)) : 0;
		if (fraction > 0) {
			parts.push('<circle cx="' + cx + '" cy="' + cy + '" r="'
				+ (0.45 * fraction).toFixed(3) + '" fill="#ffe25a" opacity="0.85"/>');
			parts.push(ctrlArcSvg(cx, cy, 0.6, 0, fraction * 360, '#ffe25a', 0.08));
		}
		var top = '<text x="' + cx + '" y="' + (cy + 0.17)
			+ '" font-size="0.5" fill="#ffffff" text-anchor="middle"'
			+ ' font-family="DejaVu Sans">' + (obj.level || 0) + '</text>';
		return { base: parts.join(''), top: top };
	}

	// Dropped resources: ground piles under creeps. The engine stores them as
	// type 'energy' docs with the amount under the resourceType key (plain
	// energy carries obj.energy). Pure energy reads yellow, anything else white.
	function droppedResourceHtml(obj) {
		var resourceType = obj.resourceType || 'energy';
		var amount = typeof obj[resourceType] === 'number' ? obj[resourceType] : (obj.energy || 0);
		var radius = 0.15 + 0.15 * Math.min(1, amount / 1000);
		var color = resourceType === 'energy' ? '#FFE87B' : '#ffffff';
		return '<g class="dojo-resource"><circle cx="' + (obj.x + 0.5) + '" cy="' + (obj.y + 0.5)
			+ '" r="' + radius.toFixed(3) + '" fill="' + color + '" opacity="0.85"/></g>';
	}

	// Tombstones: small grey headstone (rounded top, flat base) with a dark
	// cross. Renders under creeps like the other ground objects.
	function tombstoneHtml(obj) {
		var cx = obj.x + 0.5;
		var cy = obj.y + 0.5;
		var left = (cx - 0.25).toFixed(3);
		var right = (cx + 0.25).toFixed(3);
		var bottom = (cy + 0.3).toFixed(3);
		var shoulder = (cy - 0.05).toFixed(3);
		return '<g class="dojo-tombstone">'
			+ '<path d="M ' + left + ' ' + bottom + ' L ' + left + ' ' + shoulder
			+ ' A 0.25 0.25 0 0 1 ' + right + ' ' + shoulder
			+ ' L ' + right + ' ' + bottom + ' Z" fill="#9a9a9a" stroke="#555555" stroke-width="0.04"/>'
			+ '<path d="M ' + cx.toFixed(3) + ' ' + (cy - 0.18).toFixed(3) + ' V ' + (cy + 0.1).toFixed(3)
			+ ' M ' + (cx - 0.09).toFixed(3) + ' ' + (cy - 0.08).toFixed(3) + ' H ' + (cx + 0.09).toFixed(3)
			+ '" stroke="#444444" stroke-width="0.05" fill="none"/></g>';
	}

	// ---- Structures for a room ----
	// Returns { html, topHtml }: html renders under creeps, topHtml (controller
	// level numbers) renders after the creep/overlay layers.
	function buildStructureHtml(baseFrame, roomName) {
		var gameTime = baseFrame.gameTime;
		var vis = new window.RoomVisual(roomName);
		var STRUCT_TYPES = ['spawn', 'extension', 'tower', 'storage', 'terminal', 'link',
			'lab', 'factory', 'observer', 'nuker', 'powerSpawn', 'container', 'road', 'rampart',
			'constructedWall', 'invaderCore', 'keeperLair', 'extractor'];
		var rawParts = [];
		var topParts = [];
		for (var i = 0; i < baseFrame.objects.length; i++) {
			var obj = baseFrame.objects[i];
			if (obj.room !== roomName || obj.type === 'creep') continue;
			if (obj.type === 'flag') continue;
			if (obj.type === 'source') {
				// black base + yellow fill disc scaled by remaining energy
				vis.circle(obj.x, obj.y, {
					radius: 0.35, fill: '#0a0a0a',
					stroke: '#333333', strokeWidth: 0.04
				});
				var cap = obj.energyCapacity;
				var fillFraction = cap > 0
					? Math.max(0, Math.min(1, (obj.energy || 0) / cap)) : 0;
				if (fillFraction > 0) {
					vis.circle(obj.x, obj.y, {
						radius: 0.32 * fillFraction, fill: '#FFE87B', opacity: 0.95
					});
				}
			} else if (obj.type === 'controller') {
				var ctrl = controllerHtml(obj);
				if (ctrl) {
					rawParts.push(ctrl.base);
					topParts.push(ctrl.top);
				}
			} else if (obj.type === 'mineral') {
				vis.circle(obj.x, obj.y, { radius: 0.35, fill: '#ffffff', opacity: 0.6 });
			} else if (obj.type === 'energy') {
				rawParts.push(droppedResourceHtml(obj));
			} else if (obj.type === 'tombstone') {
				rawParts.push(tombstoneHtml(obj));
			} else if (STRUCT_TYPES.indexOf(obj.type) !== -1) {
				// Energy-fill cores: spawn/extension read store vs capacity,
				// links are fixed 800. Omitted (no store data) -> classic look.
				var structOpts;
				if ((obj.type === 'spawn' || obj.type === 'extension')
						&& obj.store && obj.storeCapacityResource
						&& obj.storeCapacityResource.energy > 0) {
					structOpts = { fillFraction: Math.max(0, Math.min(1,
						(obj.store.energy || 0) / obj.storeCapacityResource.energy)) };
				} else if (obj.type === 'link' && obj.store) {
					structOpts = { fillFraction: Math.max(0, Math.min(1,
						(obj.store.energy || 0) / 800)) };
				}
				vis.structure(obj.x, obj.y, obj.type, structOpts);
				// Spawn progress: white clockwise arc from the top, sweep grows
				// as the creep nears completion. The engine stores spawnTime
				// (completion gameTime) and needTime (total ticks):
				// fraction = 1 - (spawnTime - gameTime) / needTime.
				if (obj.type === 'spawn' && obj.spawning
						&& typeof obj.spawning.spawnTime === 'number'
						&& obj.spawning.needTime > 0) {
					var spawnFraction = Math.max(0, Math.min(1,
						1 - (obj.spawning.spawnTime - gameTime) / obj.spawning.needTime));
					if (spawnFraction > 0) {
						rawParts.push('<g class="dojo-spawn-progress" opacity="0.85">'
							+ ctrlArcSvg(obj.x + 0.5, obj.y + 0.5, 0.52, 0,
								spawnFraction * 360, '#ffffff', 0.12)
							+ '</g>');
					}
				}
			}
		}
		vis.connectRoads();
		return { html: visualToSvgString(vis) + rawParts.join(''), topHtml: topParts.join('') };
	}

	// ---- Flag rendering ----
	function buildFlagsHtml(flags, roomName) {
		var vis = new window.RoomVisual(roomName);
		for (var i = 0; i < flags.length; i++) {
			var flagDoc = flags[i];
			if (flagDoc.room !== roomName) continue;
			var entries = String(flagDoc.data || '').split('|').filter(Boolean);
			for (var j = 0; j < entries.length; j++) {
				var fields = entries[j].split('~');
				var fx = Number(fields[3]), fy = Number(fields[4]);
				vis.poly([[fx, fy + 0.3], [fx, fy - 0.5], [fx + 0.5, fy - 0.3], [fx, fy - 0.1]],
					{ stroke: '#ffffff', strokeWidth: 0.08, fill: '#ff6666', opacity: 0.9 });
				vis.text(fields[0], fx, fy + 0.85, { font: 0.4, color: '#ffffff', opacity: 0.8 });
			}
		}
		return visualToSvgString(vis);
	}

	// ---- Creep drawing ----
	function drawCreepHtml(creep, x, y, botUserId, opacity, facingAngle) {
		var creepParts = [];
		var overlay = new window.RoomVisual('');

		// String(): old recordings may carry numeric user ids from un-normalized scenarios
		if (NPC_USER_IDS.indexOf(String(creep.user)) !== -1) {
			creepParts.push(invaderSvg(x, y, opacity, facingAngle));
		} else {
			var bodyCounts = DojoCreepSprite.countBodyParts(creep.body || []);
			var innerColor = creep.user === botUserId ? '#5577ff' : '#ff5555';
			// Ring design "faces" up; +90 points it along the facing heading
			// (0 degrees = east) so the action arcs lead the way.
			creepParts.push(DojoCreepSprite.generateCreepSvg(
				x + 0.5, y + 0.5, CREEP_SIZE_TILES, bodyCounts, creep.store, opacity, innerColor,
				creep.storeCapacity,
				(facingAngle !== undefined ? facingAngle : 0) + 90));
		}

		if (creep.hits !== undefined && creep.hitsMax && creep.hits < creep.hitsMax) {
			var fraction = Math.max(0, creep.hits / creep.hitsMax);
			overlay.rect(x - 0.5, y - 0.85, 1.0, 0.15, { fill: '#555555', opacity: opacity });
			overlay.rect(x - 0.5, y - 0.85, fraction, 0.15, { fill: '#65fd62', opacity: opacity });
		}

		if (creep.actionLog && creep.actionLog.say && creep.actionLog.say.message) {
			overlay.speech(creep.actionLog.say.message, x, y, { textsize: 0.7, opacity: 0.95 });
		}

		return { creep: creepParts.join(''), overlay: visualToSvgString(overlay) };
	}

	// Spawning creeps: ring only, parked beneath the spawn graphic — no bob,
	// no facing rotation, no HP bar / say overlay.
	function drawSpawningCreepHtml(creep, botUserId) {
		if (NPC_USER_IDS.indexOf(String(creep.user)) !== -1) {
			return invaderSvg(creep.x, creep.y, 1, 0);
		}
		var bodyCounts = DojoCreepSprite.countBodyParts(creep.body || []);
		var innerColor = creep.user === botUserId ? '#5577ff' : '#ff5555';
		return DojoCreepSprite.generateCreepSvg(
			creep.x + 0.5, creep.y + 0.5, CREEP_SIZE_TILES, bodyCounts, creep.store, 1, innerColor,
			creep.storeCapacity);
	}

	// Animated beam: a faint guide line over the full span plus a bright pulse
	// segment whose head travels from -> to as t advances (the tail trails by
	// 0.18). Coordinates are tile coords (RoomVisual convention, +0.5 to SVG).
	function beamHtml(fromX, fromY, toX, toY, color, width, t) {
		var x1 = fromX + 0.5, y1 = fromY + 0.5;
		var x2 = toX + 0.5, y2 = toY + 0.5;
		var tail = Math.max(0, t - 0.18);
		return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2
			+ '" stroke="' + color + '" stroke-width="' + (width * 0.6).toFixed(3)
			+ '" opacity="0.25" stroke-linecap="round"/>'
			+ '<line x1="' + lerp(x1, x2, tail).toFixed(3) + '" y1="' + lerp(y1, y2, tail).toFixed(3)
			+ '" x2="' + lerp(x1, x2, t).toFixed(3) + '" y2="' + lerp(y1, y2, t).toFixed(3)
			+ '" stroke="' + color + '" stroke-width="' + width
			+ '" opacity="0.9" stroke-linecap="round"/>';
	}

	// ---- Effect lines ----
	// creep is the NEXT-frame object (its actionLog describes this transition);
	// x/y is the drawn (lerped + bobbed) anchor; t is the interpolation phase
	// driving the pulse animations.
	function drawEffectsHtml(creep, x, y, t) {
		var overlay = new window.RoomVisual('');
		var beams = [];
		var al = creep.actionLog || {};
		if (al.attack) {
			beams.push(beamHtml(x, y, al.attack.x, al.attack.y, '#ff4040', 0.15, t));
			overlay.circle(al.attack.x, al.attack.y, {
				radius: 0.5, fill: 'transparent',
				stroke: '#ff4040', strokeWidth: 0.08, opacity: 0.8
			});
		}
		if (al.rangedAttack) {
			beams.push(beamHtml(x, y, al.rangedAttack.x, al.rangedAttack.y, '#5d80b2', 0.1, t));
		}
		if (al.upgradeController) {
			beams.push(beamHtml(x, y, al.upgradeController.x, al.upgradeController.y, '#ffe25a', 0.12, t));
			overlay.circle(al.upgradeController.x, al.upgradeController.y,
				{ radius: 0.2, fill: '#ffe25a', opacity: 0.5 });
		}
		if (al.heal) {
			if (al.heal.x === creep.x && al.heal.y === creep.y) {
				// self-heal: pulsing glow on the creep instead of a beam
				overlay.circle(x, y, {
					radius: 0.55 + 0.1 * Math.sin(Math.PI * t), fill: 'transparent',
					stroke: '#5cff6a', strokeWidth: 0.08,
					opacity: 0.4 + 0.4 * Math.sin(Math.PI * t)
				});
			} else {
				beams.push(beamHtml(x, y, al.heal.x, al.heal.y, '#65fd62', 0.1, t));
			}
		}
		if (al.rangedHeal) {
			beams.push(beamHtml(x, y, al.rangedHeal.x, al.rangedHeal.y, '#65fd62', 0.08, t));
		}
		if (al.rangedMassAttack) {
			// expanding pulse ring (actionLog carries an empty {} marker)
			overlay.circle(x, y, {
				radius: Math.max(0.2, 3 * t), fill: 'transparent',
				stroke: '#5d80b2', strokeWidth: 0.1, opacity: 0.8 * (1 - t)
			});
		}
		return beams.join('') + visualToSvgString(overlay);
	}

	function indexById(objects) {
		var byId = {};
		for (var i = 0; i < objects.length; i++) byId[objects[i]._id] = objects[i];
		return byId;
	}

	// ---- Build full SVG markup for a frame (with interpolation t in [0,1)) ----
	function buildFrameSvg(recording, frameIndex, t) {
		var roomNames = Object.keys(recording.terrain);
		var layout = computeLayout(roomNames);
		var scale = PIXELS_PER_ROOM / ROOM_TILES;
		var totalW = layout.columns * PIXELS_PER_ROOM;
		var totalH = layout.rows * PIXELS_PER_ROOM;

		var baseFrame = recording.frames[frameIndex];
		var nextFrame = recording.frames[frameIndex + 1] || null;
		var nextById = nextFrame ? indexById(nextFrame.objects) : null;
		var baseById = indexById(baseFrame.objects);
		var botUserId = recording.meta.botUserId;

		// Responsive: the element fills its container; the viewBox keeps the
		// internal coordinate system. data-full-w/h carry the stitched pixel
		// size for the zoom/pan code (the width attr is no longer a number).
		var parts = ['<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" '
			+ 'preserveAspectRatio="xMidYMid meet" data-full-w="' + totalW + '" data-full-h="'
			+ totalH + '" viewBox="0 0 ' + totalW + ' ' + totalH + '">'];

		for (var ri = 0; ri < roomNames.length; ri++) {
			var roomName = roomNames[ri];
			var offset = layout.offsets[roomName];
			var tx = offset.col * PIXELS_PER_ROOM;
			var ty = offset.row * PIXELS_PER_ROOM;

			parts.push('<g transform="translate(' + tx + ',' + ty + ') scale(' + scale + ')">');

			// Terrain
			parts.push(terrainHtml(recording.terrain[roomName]));

			// Spawning creeps render beneath the structure layer so they peek
			// out from under the spawn graphic while it builds them.
			var spawningParts = [];
			for (var spi = 0; spi < baseFrame.objects.length; spi++) {
				var spObj = baseFrame.objects[spi];
				if (spObj.room !== roomName || spObj.type !== 'creep' || !spObj.spawning) continue;
				spawningParts.push(drawSpawningCreepHtml(spObj, botUserId));
			}
			if (spawningParts.length) {
				parts.push('<g class="dojo-spawning">' + spawningParts.join('') + '</g>');
			}

			// Structures (positions are static; source energy / controller
			// progress read from the current frame's objects)
			var structureHtml = buildStructureHtml(baseFrame, roomName);
			parts.push(structureHtml.html);

			// Flags
			var flagsHtml = buildFlagsHtml(baseFrame.flags || [], roomName);
			parts.push(flagsHtml);

			// Creeps
			var creepParts = [];
			var overlayParts = [];

			for (var oi = 0; oi < baseFrame.objects.length; oi++) {
				var obj = baseFrame.objects[oi];
				if (obj.room !== roomName || obj.type !== 'creep') continue;
				if (obj.spawning) continue; // drawn beneath the spawn already
				var next = nextById ? nextById[obj._id] : null;
				// Cross-room transition: express next's position in the BASE
				// room's local space so the creep lerps across the seam (SVG
				// groups don't clip, so out-of-range coords draw fine). If the
				// destination room isn't rendered, fall back to the death fade.
				var nextLocal = null;
				if (next) {
					if (next.room === obj.room) {
						nextLocal = { x: next.x, y: next.y };
					} else if (layout.offsets[next.room]) {
						nextLocal = {
							x: next.x + (layout.offsets[next.room].col - offset.col) * ROOM_TILES,
							y: next.y + (layout.offsets[next.room].row - offset.row) * ROOM_TILES
						};
					}
				}
				var cx, cy, drawn;
				if (nextLocal) {
					cx = lerp(obj.x, nextLocal.x, t);
					cy = lerp(obj.y, nextLocal.y, t);
					// Work bob: when the upcoming tick harvests or attacks an
					// adjacent target, nudge the whole creep (sprite, HP bar,
					// say, effect anchors) toward it. Direction comes from the
					// next-frame pose since the actionLog belongs to that tick.
					var nal = next.actionLog || {};
					var bobTarget = (nal.harvest && typeof nal.harvest.x === 'number') ? nal.harvest
						: (nal.attack && typeof nal.attack.x === 'number') ? nal.attack : null;
					if (bobTarget) {
						var bdx = bobTarget.x - next.x;
						var bdy = bobTarget.y - next.y;
						var bdist = Math.sqrt(bdx * bdx + bdy * bdy);
						if (bdist > 0) {
							var bob = 0.15 * Math.sin(Math.PI * t);
							cx += (bdx / bdist) * bob;
							cy += (bdy / bdist) * bob;
						}
					}
					// HP/say from BASE frame; effects from next
					drawn = drawCreepHtml(obj, cx, cy, botUserId, 1,
						creepFacing(recording, layout, frameIndex, obj._id));
					creepParts.push(drawn.creep);
					overlayParts.push(drawn.overlay);
					overlayParts.push(drawEffectsHtml(next, cx, cy, t));
				} else if (nextFrame) {
					// death fade (also: walked into a room outside the layout)
					drawn = drawCreepHtml(obj, obj.x, obj.y, botUserId, 1 - t,
						creepFacing(recording, layout, frameIndex, obj._id));
					creepParts.push(drawn.creep);
					overlayParts.push(drawn.overlay);
				} else {
					drawn = drawCreepHtml(obj, obj.x, obj.y, botUserId, 1,
						creepFacing(recording, layout, frameIndex, obj._id));
					creepParts.push(drawn.creep);
					overlayParts.push(drawn.overlay);
				}
			}

			// Spawn fade-in (creeps that appear in next frame only; ones still
			// inside a spawn join the under-structure layer next frame instead)
			if (nextFrame) {
				for (var ni = 0; ni < nextFrame.objects.length; ni++) {
					var nobj = nextFrame.objects[ni];
					if (nobj.room !== roomName || nobj.type !== 'creep'
						|| nobj.spawning || baseById[nobj._id]) continue;
					var spawned = drawCreepHtml(nobj, nobj.x, nobj.y, botUserId, t,
						creepFacing(recording, layout, frameIndex + 1, nobj._id));
					creepParts.push(spawned.creep);
					overlayParts.push(spawned.overlay);
				}
			}

			// Link energy beams: structure actionLog rides the next frame,
			// same convention as creep effects.
			if (nextFrame) {
				for (var li = 0; li < nextFrame.objects.length; li++) {
					var lobj = nextFrame.objects[li];
					if (lobj.room !== roomName || lobj.type !== 'link') continue;
					var lal = lobj.actionLog || {};
					if (lal.transferEnergy && typeof lal.transferEnergy.x === 'number'
							&& typeof lal.transferEnergy.y === 'number') {
						overlayParts.push(beamHtml(lobj.x, lobj.y,
							lal.transferEnergy.x, lal.transferEnergy.y, '#ffe25a', 0.12, t));
					}
				}
			}

			parts.push(creepParts.join(''));
			parts.push(overlayParts.join(''));
			// Controller level numbers render last so creeps never cover them
			parts.push(structureHtml.topHtml);
			parts.push('</g>');
		}

		parts.push('</svg>');
		return parts.join('');
	}

	// ---- State ----
	var replayState = {
		recording: null,
		frameIndex: 0,
		playing: false,
		speed: 1,
		animStart: null,    // performance.now() when this tick animation started
		animT: 0,           // current interpolation t [0,1)
		holdTimer: null,
		rafId: null,
		viewBox: null,      // {x, y, w, h} zoom/pan state; null = full view
		fullW: 0,           // rendered SVG width (all stitched rooms)
		fullH: 0
	};

	// ---- DOM refs ----
	var dropZone = document.getElementById('replay-drop-zone');
	var svgWrap = document.getElementById('replay-svg-wrap');
	var slider = document.getElementById('replay-slider');
	var tickLabel = document.getElementById('replay-tick-label');
	var playBtn = document.getElementById('replay-play-btn');
	var speedSelect = document.getElementById('replay-speed-select');
	var endReasonSpan = document.getElementById('replay-end-reason');
	var metaDiv = document.getElementById('replay-meta');
	var hitsDiv = document.getElementById('replay-creep-hits');
	var loadError = document.getElementById('replay-load-error');
	var fileInput = document.getElementById('replay-file-input');
	var replayPane = document.getElementById('replay-pane');

	// ---- Zoom/pan: viewBox state persisted across re-renders ----
	// Per-frame re-renders replace the SVG node, so the stored viewBox must be
	// reapplied after every render for zoom/pan to survive playback/scrubbing.
	var ZOOM_FACTOR = 1.15;
	var ZOOM_MIN = 0.5;   // can zoom out to half the full view scale
	var ZOOM_MAX = 20;

	function applyViewBox() {
		var svgEl = svgWrap.querySelector('svg');
		if (!svgEl) return;
		// width/height attrs are "100%" now; the stitched pixel size travels
		// in data attributes set by buildFrameSvg.
		replayState.fullW = Number(svgEl.getAttribute('data-full-w'));
		replayState.fullH = Number(svgEl.getAttribute('data-full-h'));
		if (!replayState.viewBox) {
			replayState.viewBox = { x: 0, y: 0, w: replayState.fullW, h: replayState.fullH };
		}
		var vb = replayState.viewBox;
		svgEl.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
	}

	// The svg element is responsive (100% x 100%, preserveAspectRatio
	// "xMidYMid meet"), so the viewBox maps onto a letterboxed sub-rect of the
	// client rect — 1 CSS px is NOT 1 viewBox unit. These helpers do the
	// conversion against the CURRENT viewBox.
	function viewBoxScale(rect, vb) {
		// CSS pixels per viewBox unit under "meet" fitting
		return Math.min(rect.width / vb.w, rect.height / vb.h);
	}

	function clientToViewBox(rect, vb, clientX, clientY) {
		var s = viewBoxScale(rect, vb);
		var contentLeft = rect.left + (rect.width - vb.w * s) / 2;
		var contentTop = rect.top + (rect.height - vb.h * s) / 2;
		return {
			x: vb.x + (clientX - contentLeft) / s,
			y: vb.y + (clientY - contentTop) / s
		};
	}

	function resetView() {
		replayState.viewBox = null;
		applyViewBox();
	}

	// ---- Render current frame to DOM ----
	function renderFrame(t) {
		if (!replayState.recording) return;
		var svgMarkup = buildFrameSvg(replayState.recording, replayState.frameIndex, t || 0);
		svgWrap.innerHTML = svgMarkup;
		applyViewBox();
		var gameTime = replayState.recording.frames[replayState.frameIndex].gameTime;
		tickLabel.textContent = 'tick ' + gameTime;
		slider.value = replayState.frameIndex;
		updateHitsReadout();
	}

	function updateHitsReadout() {
		if (!replayState.recording) return;
		var frame = replayState.recording.frames[replayState.frameIndex];
		var creeps = frame.objects.filter(function (o) { return o.type === 'creep'; });
		var html = '';
		creeps.forEach(function (c) {
			var label = c.name || c._id.slice(-6);
			html += '<div class="replay-creep-row">' + label + ': '
				+ c.hits + '/' + c.hitsMax + '</div>';
		});
		hitsDiv.innerHTML = html;
	}

	// ---- Load recording ----
	function loadRecording(json) {
		try {
			var rec = typeof json === 'string' ? JSON.parse(json) : json;
			if (!rec.meta || !rec.terrain || !rec.frames || !rec.frames.length) {
				throw new Error('invalid recording: missing meta/terrain/frames');
			}
			replayState.recording = rec;
			replayState.frameIndex = 0;
			replayState.playing = false;
			replayState.viewBox = null; // reset zoom/pan for the new recording
			stopPlayback();

			slider.min = 0;
			slider.max = rec.frames.length - 1;
			slider.value = 0;

			var m = rec.meta;
			metaDiv.innerHTML = 'scenario: ' + (m.scenario || '?')
				+ '<br>ticks: ' + (m.ticks || '?')
				+ '<br>rooms: ' + Object.keys(rec.terrain).join(', ');
			endReasonSpan.textContent = m.endReason || '';
			loadError.textContent = '';

			dropZone.classList.add('hidden');
			svgWrap.classList.add('visible');
			playBtn.textContent = '▶ Play';

			renderFrame(0);
		} catch (err) {
			loadError.textContent = 'Error: ' + err.message;
		}
	}

	// Expose for test/automation
	window.dojoViewerLoad = loadRecording;

	// ---- Playback ----
	var TICK_ANIM_MS = 800;  // 0.8s interpolation per tick
	var HOLD_MS = 200;       // 0.2s hold at the end of each tick

	function stopPlayback() {
		if (replayState.rafId !== null) {
			cancelAnimationFrame(replayState.rafId);
			replayState.rafId = null;
		}
		if (replayState.holdTimer !== null) {
			clearTimeout(replayState.holdTimer);
			replayState.holdTimer = null;
		}
		replayState.playing = false;
		playBtn.textContent = '▶ Play';
	}

	function advanceToNextTick() {
		var rec = replayState.recording;
		if (!rec) { stopPlayback(); return; }
		replayState.frameIndex++;
		if (replayState.frameIndex >= rec.frames.length) {
			replayState.frameIndex = rec.frames.length - 1;
			stopPlayback();
			renderFrame(0);
			return;
		}
		renderFrame(0);
		startTickAnimation();
	}

	function startTickAnimation() {
		var speed = replayState.speed;
		var animDuration = TICK_ANIM_MS / speed;
		var holdDuration = HOLD_MS / speed;
		replayState.animStart = performance.now();

		function rafLoop(now) {
			if (!replayState.playing) return;
			var elapsed = now - replayState.animStart;
			var t = Math.min(elapsed / animDuration, 1);
			renderFrame(t);
			if (t < 1) {
				replayState.rafId = requestAnimationFrame(rafLoop);
			} else {
				replayState.rafId = null;
				// Hold at t=1 then advance
				replayState.holdTimer = setTimeout(advanceToNextTick, holdDuration);
			}
		}
		replayState.rafId = requestAnimationFrame(rafLoop);
	}

	function togglePlayback() {
		if (!replayState.recording) return;
		if (replayState.playing) {
			stopPlayback();
		} else {
			// If at last frame, restart
			if (replayState.frameIndex >= replayState.recording.frames.length - 1) {
				replayState.frameIndex = 0;
				renderFrame(0);
			}
			replayState.playing = true;
			playBtn.textContent = '⏸ Pause';
			startTickAnimation();
		}
	}

	// ---- UI wiring ----
	playBtn.addEventListener('click', togglePlayback);

	speedSelect.addEventListener('change', function () {
		replayState.speed = Number(speedSelect.value);
	});

	slider.addEventListener('input', function () {
		stopPlayback();
		replayState.frameIndex = Number(slider.value);
		renderFrame(0);
	});

	// ---- Zoom (wheel) + pan (left-drag) on the replay SVG container only ----
	svgWrap.addEventListener('wheel', function (e) {
		if (!replayState.viewBox) return;
		e.preventDefault(); // keep the page from scrolling
		var svgEl = svgWrap.querySelector('svg');
		if (!svgEl) return;
		var rect = svgEl.getBoundingClientRect();
		if (!rect.width || !rect.height) return;
		var vb = replayState.viewBox;
		// Point under the cursor in viewBox coordinates: it must stay put.
		var cursor = clientToViewBox(rect, vb, e.clientX, e.clientY);
		var px = cursor.x;
		var py = cursor.y;
		var factor = e.deltaY < 0 ? 1 / ZOOM_FACTOR : ZOOM_FACTOR; // wheel up = zoom in
		var newW = vb.w * factor;
		var minW = replayState.fullW / ZOOM_MAX;
		var maxW = replayState.fullW / ZOOM_MIN;
		newW = Math.max(minW, Math.min(maxW, newW));
		var newH = newW * (vb.h / vb.w);
		vb.x = px - (px - vb.x) * (newW / vb.w);
		vb.y = py - (py - vb.y) * (newH / vb.h);
		vb.w = newW;
		vb.h = newH;
		applyViewBox();
	}, { passive: false });

	var panDrag = null;
	svgWrap.addEventListener('mousedown', function (e) {
		if (e.button !== 0 || !replayState.viewBox) return;
		var svgEl = svgWrap.querySelector('svg');
		if (!svgEl) return;
		var rect = svgEl.getBoundingClientRect();
		if (!rect.width || !rect.height) return;
		e.preventDefault();
		// viewBox units per CSS pixel: uniform under "meet" fitting, so one
		// value covers both axes (letterboxing means rect ratios would be wrong)
		var unit = 1 / viewBoxScale(rect, replayState.viewBox);
		panDrag = {
			startX: e.clientX,
			startY: e.clientY,
			vbX: replayState.viewBox.x,
			vbY: replayState.viewBox.y,
			unitX: unit,
			unitY: unit
		};
		svgWrap.classList.add('panning');
	});
	window.addEventListener('mousemove', function (e) {
		if (!panDrag) return;
		replayState.viewBox.x = panDrag.vbX - (e.clientX - panDrag.startX) * panDrag.unitX;
		replayState.viewBox.y = panDrag.vbY - (e.clientY - panDrag.startY) * panDrag.unitY;
		applyViewBox();
	});
	window.addEventListener('mouseup', function () {
		if (!panDrag) return;
		panDrag = null;
		svgWrap.classList.remove('panning');
	});

	svgWrap.addEventListener('dblclick', resetView);
	document.getElementById('replay-reset-view-btn').addEventListener('click', resetView);

	// File input
	fileInput.addEventListener('change', function (e) {
		var file = e.target.files[0];
		if (!file) return;
		var reader = new FileReader();
		reader.onload = function (ev) { loadRecording(ev.target.result); };
		reader.readAsText(file);
	});

	// Drag-drop
	replayPane.addEventListener('dragover', function (e) {
		e.preventDefault();
		dropZone.classList.add('drag-over');
	});
	replayPane.addEventListener('dragleave', function () {
		dropZone.classList.remove('drag-over');
	});
	replayPane.addEventListener('drop', function (e) {
		e.preventDefault();
		dropZone.classList.remove('drag-over');
		var file = e.dataTransfer.files[0];
		if (!file) return;
		var reader = new FileReader();
		reader.onload = function (ev) { loadRecording(ev.target.result); };
		reader.readAsText(file);
	});

	// Click on drop zone triggers file picker
	dropZone.addEventListener('click', function () {
		fileInput.click();
	});

})();
</script>
</body>
</html>
