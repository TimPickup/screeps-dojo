services:
  dojo:
    build: .
    working_dir: /dojo
    volumes:
      - .:/dojo
      # anonymous volume: keeps the image's baked node_modules over the bind
      # mount, re-seeded from the image on every fresh container. (A NAMED volume,
      # once created, is never re-initialised from the image — so a single failed
      # run could leave it empty and force a slow runtime reinstall.)
      - /dojo/node_modules
      # bot path is optional — defaults to the project dir so the example
      # scenarios (local main.js) run with no .env at all. Set DOJO_BOT_PATH to
      # mount your real bot code read-only at /bot.
      - ${DOJO_BOT_PATH:-.}:/bot:ro
    environment:
      - DOJO_BOT_DIR=/bot
      - DOJO_FAST_MOCK_ENGINE=${DOJO_FAST_MOCK_ENGINE:-1}
      - DOJO_FAST_MOCK_ENGINE_RPC_V8=${DOJO_FAST_MOCK_ENGINE_RPC_V8:-}
      - DOJO_FAST_MOCK_ENGINE_CODE_CACHE=${DOJO_FAST_MOCK_ENGINE_CODE_CACHE:-}
      - DOJO_FAST_MOCK_ENGINE_ROOM_GUARD=${DOJO_FAST_MOCK_ENGINE_ROOM_GUARD:-}
      - DOJO_FAST_MOCK_ENGINE_IN_PROCESS=${DOJO_FAST_MOCK_ENGINE_IN_PROCESS:-}
      - DOJO_FAST_MOCK_ENGINE_RESET_ACTIVE_ROOMS=${DOJO_FAST_MOCK_ENGINE_RESET_ACTIVE_ROOMS:-}

  # GUI control-plane server. Same image/volumes as dojo. The server binds
  # 0.0.0.0 inside the container; the port is published only to the HOST
  # loopback (127.0.0.1) so the UI — which can edit .env and holds a live
  # Screeps token — is never exposed on the network.
  ui:
    build: .
    working_dir: /dojo
    command: node scripts/serve.js
    volumes:
      - .:/dojo
      - /dojo/node_modules
      - ${DOJO_BOT_PATH:-.}:/bot:ro
    environment:
      - DOJO_BOT_DIR=/bot
      - DOJO_UI_PORT=${DOJO_UI_PORT:-8787}
      - DOJO_FAST_MOCK_ENGINE=${DOJO_FAST_MOCK_ENGINE:-1}
      - DOJO_FAST_MOCK_ENGINE_RPC_V8=${DOJO_FAST_MOCK_ENGINE_RPC_V8:-}
      - DOJO_FAST_MOCK_ENGINE_CODE_CACHE=${DOJO_FAST_MOCK_ENGINE_CODE_CACHE:-}
      - DOJO_FAST_MOCK_ENGINE_ROOM_GUARD=${DOJO_FAST_MOCK_ENGINE_ROOM_GUARD:-}
      - DOJO_FAST_MOCK_ENGINE_IN_PROCESS=${DOJO_FAST_MOCK_ENGINE_IN_PROCESS:-}
      - DOJO_FAST_MOCK_ENGINE_RESET_ACTIVE_ROOMS=${DOJO_FAST_MOCK_ENGINE_RESET_ACTIVE_ROOMS:-}
    ports:
      - "127.0.0.1:${DOJO_UI_PORT:-8787}:${DOJO_UI_PORT:-8787}"
